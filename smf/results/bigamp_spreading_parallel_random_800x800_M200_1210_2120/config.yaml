algorithm:
  convergence_threshold: 1.0e-06
  damping: 0.5
  early_stop: false
  learning_rate: 0.01
  noise_var: 1.0e-10
  use_compile: true
algorithm_key: bigamp_spreading_parallel
alpha:
  start: 2.5
  step: 0.05
  stop: 4.0
execution:
  include_qy_plot: true
  include_summary_plot: true
  metrics_to_compute:
  - Q_Y
  - Q_W
  - Q_X
  - Q_W_prime
  - Q_X_prime
  - Gen_Error
  plots: []
graph_key: random
matrix:
  M: 200
  N1: 800
  N2: 800
spreading:
  f_distribution: rademacher
  seed: 12345
  teacher_type: orthogonal
teacher_key: standard
training:
  max_epochs: 20000
  max_steps: 5000
  resample_mask: true
  samples_per_alpha: 4
  seed: 42
