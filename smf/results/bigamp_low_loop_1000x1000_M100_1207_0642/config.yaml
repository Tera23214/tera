algorithm:
  convergence_threshold: 1.0e-06
  damping: 0.5
  early_stop: false
  learning_rate: 0.01
  noise_var: 1.0e-10
  use_compile: true
algorithm_key: bigamp
alpha:
  start: 0.0
  step: 0.1
  stop: 3.0
execution:
  include_qy_plot: false
  include_summary_plot: false
  metrics_to_compute:
  - Q_Y
  - Q_Y_unobserved
  plots:
  - filename: qy_vs_unobserved_ortho_lowloop.png
    metrics:
    - Q_Y
    - Q_Y_unobserved
    title: Q_Y vs Q_Y_unobserved (Orthogonal Teacher, Low-Loop Graph)
    type: comparison
graph_key: low_loop
matrix:
  M: 100
  N1: 1000
  N2: 1000
teacher_key: orthogonal
training:
  max_epochs: 20000
  max_steps: 2000
  resample_mask: true
  samples_per_alpha: 1
  seed: 42
