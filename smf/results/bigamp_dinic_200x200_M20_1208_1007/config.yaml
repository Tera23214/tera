algorithm:
  convergence_threshold: 1.0e-06
  damping: 0.5
  early_stop: false
  learning_rate: 0.01
  noise_var: 1.0e-10
  use_compile: true
algorithm_key: bigamp
alpha:
  start: 0.0
  step: 0.5
  stop: 2.0
execution:
  include_qy_plot: true
  include_summary_plot: true
  metrics_to_compute:
  - Q_Y
  - Q_W
  - Q_X
  - Q_W_prime
  - Q_X_prime
  - Gen_Error
  plots: []
graph_key: dinic
matrix:
  M: 20
  N1: 200
  N2: 200
teacher_key: orthogonal
training:
  max_epochs: 20000
  max_steps: 500
  resample_mask: true
  samples_per_alpha: 2
  seed: 42
