F_distribution: standard_normal
F_seed: 501
F_shape:
- 200
- 200
- 50
M: 50
N: 200
algorithm: sgd_cosine_minibatch_F_random
alpha_start: 0
alpha_step: 0.2
alpha_stop: 4.0
batch_size: 2000
convergence_threshold: 1.0e-05
device: mps
early_stop_metric: abs_delta_loss_per_edge
effective_epoch_formula: max_steps * batch_size / num_observed
evaluation_metric: cosine_similarity_in_full_Y_space
graph_seed: 1
lambda: 1.0
loss_eval_interval: 100
lr_schedule:
- alpha_max: 0.5
  alpha_min: 0.0
  lr: 0.001
- alpha_max: 1.5
  alpha_min: 0.5
  lr: 0.0015
- alpha_max: 3.0
  alpha_min: 1.5
  lr: 0.0015
- alpha_max: .inf
  alpha_min: 3.0
  lr: 0.0015
max_steps: 100000
noise_seed: 1001
noise_var: 0
num_replicas: 5
observation_model: Y_ij = lambda/sqrt(M) * sum_mu F_ij,mu W_i,mu X_mu,j + noise
replica_variation: student_initialization_only
sampling: with_replacement
save_every_replicas: 10
shared_per_alpha_graph_noise: true
shared_teacher_F_noise_global: true
student_seed_base: 100
teacher_seed: 1
