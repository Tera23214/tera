_description: Standard phase transition sweep (200x200, fine alpha steps)

matrix:
  N1: 200
  N2: 200
  M: 50

alpha:
  start: 0.0
  stop: 4.0
  step: 0.1

training:
  max_steps: 5000
  samples_per_alpha: 1
  seed: 42

algorithm:
  damping: 0.5
  noise_var: 1.0e-10
  use_compile: true

algorithm_key: bigamp
graph_key: random
teacher_key: standard
