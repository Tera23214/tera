algorithm: gamp_Dence_Alternating_non_uniform_n1_cosine_loss_vs_step
graph_model: non_uniform_n1_graph
alpha: 2
N1: 2000
N2: 2000
M: 200
p: 0.2
r: 5
p_eff: 0.2
alpha_eff: 2.0
ca: 1112
cb: 222
num_ca: 400
num_cb: 1600
E: 800000
max_steps: 10000
damping: 0
