algorithm: gamp_Dence_Alternating_non_uniform_n1_cosine_loss_vs_step
graph_model: non_uniform_n1_graph
alpha: 1.0
N1: 12
N2: 12
M: 3
p: 0.5
r: 0.5
p_eff: 0.5
alpha_eff: 1.0
ca: 2
cb: 4
num_ca: 6
num_cb: 6
E: 36
max_steps: 2
damping: 0
damping_schedule: constant
beta_scale: 0.01
beta_max: 0.4
noise_var: 1.0e-06
student_init_mode: teacher_plus_noise_normalized
student_init_epsilon: 0.1
teacher_seed: 1
graph_seed: 1
noise_seed: 1
student_seed_base: 100
legacy_cli_seed: 1
num_replicas: 1
convergence_threshold: 1.0e-06
loss_eval_interval: 1
early_stop: false
evaluation_metric: cosine_similarity_in_Y_space
update_scheme: alternating_W_then_X
step_definition: one_W_update_plus_one_X_update
onsager_memory_schedule: half_step
shared_teacher_noise_global: true
shared_graph_per_alpha: true
dense_mask: true
device: cpu
