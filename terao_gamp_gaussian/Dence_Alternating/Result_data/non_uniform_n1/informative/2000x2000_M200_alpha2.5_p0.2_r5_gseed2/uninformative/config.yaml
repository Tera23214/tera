algorithm: gamp_Dence_Alternating_non_uniform_n1_cosine_loss_vs_step
graph_model: non_uniform_n1_graph
alpha: 2.5
N1: 2000
N2: 2000
M: 200
p: 0.2
r: 10
p_eff: 0.2
alpha_eff: 2.5
ca: 1784
cb: 179
num_ca: 400
num_cb: 1600
E: 1000000
max_steps: 30000
damping: 0
