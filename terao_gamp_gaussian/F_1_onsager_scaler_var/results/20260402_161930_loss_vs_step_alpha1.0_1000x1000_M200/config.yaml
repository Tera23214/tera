M: 200
N1: 1000
N2: 1000
algorithm: gamp_F_1_onsager_loss_vs_step
alpha: 1.0
beta_max: 0.5
beta_scale: 0.001
convergence_threshold: 1.0e-06
damping: 0.5
damping_schedule: beta
device: mps
early_stop: false
loss_definition: sum_squared_error_on_observed_entries
loss_eval_interval: 1
max_steps: 500
noise_var: 0.001
num_observed_entries: 200000
num_replicas: 3
seed: 42
