M: 200
N1: 1000
N2: 1000
algorithm: gamp_F_1_onsager_cosine_loss_vs_step
alpha: 1.0
beta_max: 0.5
beta_scale: 0.001
clean_loss_definition: sum_squared_error_on_observed_entries_against_noise_free_targets
convergence_threshold: 1.0e-06
damping: 0.5
damping_schedule: beta
device: mps
early_stop: false
evaluation_metric: cosine_similarity_in_Y_space
loss_definition: sum_squared_error_on_observed_entries
loss_eval_interval: 1
max_steps: 500
noise_var: 0.001
num_observed_entries: 200000
num_replicas: 1
seed: 42
